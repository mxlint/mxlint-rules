      MainFunction:
        - Attributes:
            $Type: Microflows$ActionActivity
            ObjectCollection:
              $Type: Microflows$MicroflowObjectCollection
              Objects:
                - $Type: Microflows$ActionActivity
                  Action:
                    $Type: Microflows$CommitAction

