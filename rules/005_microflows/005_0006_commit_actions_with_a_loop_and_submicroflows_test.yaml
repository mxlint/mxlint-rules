      Name: SubmicroflowA
      MainFunction:
        - Attributes:
            $Type: Microflows$ActionActivity
            ObjectCollection:
              $Type: Microflows$MicroflowObjectCollection
              Objects:
                - $Type: Microflows$ActionActivity
                  Action:
                    $Type: Microflows$MicroflowCallAction
                    MicroflowName: Module2.SubmicroflowB
    "Module2.SubmicroflowB$Microflow.yaml":
